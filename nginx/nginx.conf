worker_processes auto;
pid D:/ott-lab/nginx/logs/nginx.pid;
error_log D:/ott-lab/nginx/logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       D:/ott-lab/nginx/mime.types;
    default_type  application/octet-stream;
    access_log D:/ott-lab/nginx/logs/access.log;

    client_body_temp_path D:/ott-lab/nginx/temp/client_body_temp;
    proxy_temp_path       D:/ott-lab/nginx/temp/proxy_temp;
    fastcgi_temp_path     D:/ott-lab/nginx/temp/fastcgi_temp;
    uwsgi_temp_path       D:/ott-lab/nginx/temp/uwsgi_temp;
    scgi_temp_path        D:/ott-lab/nginx/temp/scgi_temp;

    # Live HLS files are rewritten frequently by FFmpeg. Keep file caching
    # opt-in only so nginx does not hold stale Windows file handles.

    server {
        listen 8080;
        server_name _;

        # HLS live stream
        location /live/ {
            alias D:/ott-lab/stream/;

            # Disable file descriptor caching for HLS files. The manifest is
            # rewritten through stream.m3u8.tmp and then renamed frequently.
            open_file_cache off;

            # Tell nginx, browsers, and any proxy not to cache
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # Correct MIME types for HLS
            types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }

            # CORS
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
        }

        # React app — file cache is fine here, assets are content-hashed
        location / {
            root D:/ott-lab/player/dist;
            try_files $uri $uri/ /index.html;

            open_file_cache max=1000 inactive=20s;
            open_file_cache_valid 30s;
            open_file_cache_min_uses 2;
            open_file_cache_errors on;
        }
    }
}
