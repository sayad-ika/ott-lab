worker_processes auto;
pid D:/ott-lab/nginx/logs/nginx.pid;
error_log D:/ott-lab/nginx/logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       D:/ott-lab/nginx/mime.types;
    default_type  application/octet-stream;
    access_log D:/ott-lab/nginx/logs/access.log;

    client_body_temp_path D:/ott-lab/nginx/temp/client_body_temp;
    proxy_temp_path       D:/ott-lab/nginx/temp/proxy_temp;
    fastcgi_temp_path     D:/ott-lab/nginx/temp/fastcgi_temp;
    uwsgi_temp_path       D:/ott-lab/nginx/temp/uwsgi_temp;
    scgi_temp_path        D:/ott-lab/nginx/temp/scgi_temp;

    # Ad break manifest proxy (Chapter 4)
    upstream ad_proxy {
        server 127.0.0.1:8081;
    }

    server {
        listen 8080;
        server_name _;

        # HLS live stream -- proxied through ad-proxy for ad break support
        location /live/ {
            proxy_pass http://ad_proxy;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;

            # Disable all caching for live HLS
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # CORS
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
        }

        # Ad break API endpoints (proxied to ad-proxy)
        location /ad-break/ {
            proxy_pass http://ad_proxy;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
        }

        # VOD HLS files (static, cacheable)
        location /vod/ {
            alias D:/ott-lab/vod/;

            # VOD files are static — enable caching
            open_file_cache max=1000 inactive=60s;
            open_file_cache_valid 30s;
            open_file_cache_min_uses 2;
            open_file_cache_errors on;

            # Cache for 1 hour (VOD content doesn't change)
            add_header Cache-Control "public, max-age=3600" always;

            # Correct MIME types for HLS
            types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }

            # CORS — player dev server is on different port
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;

            # Byte-range support for seeking within TS segments
            add_header Accept-Ranges bytes always;
        }

        # React app — file cache is fine here, assets are content-hashed
        location / {
            root D:/ott-lab/player/dist;
            try_files $uri $uri/ /index.html;

            open_file_cache max=1000 inactive=20s;
            open_file_cache_valid 30s;
            open_file_cache_min_uses 2;
            open_file_cache_errors on;
        }
    }
}
